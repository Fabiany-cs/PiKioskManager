<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kiosk Manager</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* ── color tokens — light mode ── */
  :root {
    --bg:        #f1f5f9;
    --surface:   #ffffff;
    --border:    #e2e8f0;
    --border2:   #cbd5e1;
    --text:      #1e293b;
    --text2:     #64748b;
    --text3:     #94a3b8;
    --btn-bg:    #f1f5f9;
    --btn-hover: #e2e8f0;
    --active-bg: #eff6ff;
    --active-border: #3b82f6;
    --active-dot: #3b82f6;
    --disabled-bg: #f8fafc;
    --disabled-text: #94a3b8;
    --save-bg:   #4f46e5;
    --save-hover:#4338ca;
    --del-bg:    #fee2e2;
    --del-text:  #b91c1c;
    --del-hover: #fecaca;
    --tog-off:   #cbd5e1;
    --tog-on:    #4f46e5;
  }

  /* ── color tokens — dark mode ── */
  @media (prefers-color-scheme: dark) {
    :root {
      --bg:        #0f172a;
      --surface:   #1e293b;
      --border:    #334155;
      --border2:   #475569;
      --text:      #f1f5f9;
      --text2:     #94a3b8;
      --text3:     #64748b;
      --btn-bg:    #1e293b;
      --btn-hover: #334155;
      --active-bg: #1e3a5f;
      --active-border: #60a5fa;
      --active-dot: #60a5fa;
      --disabled-bg: #0f172a;
      --disabled-text: #475569;
      --save-bg:   #4f46e5;
      --save-hover:#6366f1;
      --del-bg:    #450a0a;
      --del-text:  #fca5a5;
      --del-hover: #7f1d1d;
      --tog-off:   #475569;
      --tog-on:    #6366f1;
    }
  }

  body {
    font-family: system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 2rem 1rem;
    min-height: 100vh;
  }
  .wrap { max-width: 640px; margin: 0 auto; }
  h1 { font-size: 1.3rem; font-weight: 600; margin-bottom: 0.2rem; }
  .sub { color: var(--text2); font-size: 0.85rem; margin-bottom: 1.75rem; }

  #list { display: flex; flex-direction: column; gap: 0.6rem; margin-bottom: 1rem; }

  .row {
    display: grid;
    grid-template-columns: 20px 1fr 90px 44px 34px 34px 34px;
    gap: 0.4rem;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.6rem 0.75rem;
    transition: border-color 0.2s, background 0.2s;
  }

  /* active row — currently showing on the kiosk */
  .row.active {
    border-color: var(--active-border);
    background: var(--active-bg);
  }

  /* disabled row — greyed out */
  .row.disabled {
    background: var(--disabled-bg);
    opacity: 0.55;
  }

  /* live dot — shown on active row */
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: transparent;
    flex-shrink: 0;
  }
  .row.active .dot { background: var(--active-dot); }

  .row input[type="text"] {
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 0.35rem 0.5rem;
    font-size: 0.875rem;
    width: 100%;
    outline: none;
    background: var(--surface);
    color: var(--text);
  }
  .row input[type="text"]:focus { border-color: var(--active-border); }

  .dur { display: flex; align-items: center; gap: 4px; }
  .dur input {
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 0.35rem 0.4rem;
    font-size: 0.875rem;
    width: 56px;
    outline: none;
    background: var(--surface);
    color: var(--text);
  }
  .dur span { font-size: 0.75rem; color: var(--text3); }

  /* ── enable/disable toggle ── */
  .toggle {
    position: relative;
    width: 34px; height: 20px;
    flex-shrink: 0;
  }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-track {
    position: absolute; inset: 0;
    background: var(--tog-off);
    border-radius: 20px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .toggle input:checked + .toggle-track { background: var(--tog-on); }
  .toggle-track::after {
    content: "";
    position: absolute;
    top: 2px; left: 2px;
    width: 16px; height: 16px;
    background: #fff;
    border-radius: 50%;
    transition: transform 0.2s;
  }
  .toggle input:checked + .toggle-track::after { transform: translateX(14px); }

  .btn {
    border: none; border-radius: 6px; cursor: pointer;
    font-size: 0.8rem; height: 30px; width: 30px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .btn-up, .btn-dn { background: var(--btn-bg); color: var(--text2); }
  .btn-up:hover, .btn-dn:hover { background: var(--btn-hover); }
  .btn-del { background: var(--del-bg); color: var(--del-text); }
  .btn-del:hover { background: var(--del-hover); }

  .actions { display: flex; gap: 0.6rem; margin-top: 0.5rem; }
  .btn-add {
    flex: 1; height: 38px; width: auto;
    background: var(--btn-bg); color: var(--text);
    border: 1px solid var(--border2); border-radius: 8px;
    font-size: 0.875rem; font-weight: 500; cursor: pointer;
  }
  .btn-add:hover { background: var(--btn-hover); }
  .btn-save {
    flex: 1; height: 38px; width: auto;
    background: var(--save-bg); color: #fff;
    border: none; border-radius: 8px;
    font-size: 0.875rem; font-weight: 600; cursor: pointer;
  }
  .btn-save:hover { background: var(--save-hover); }

  .toast {
    margin-top: 1rem; padding: 0.6rem 1rem;
    border-radius: 8px; font-size: 0.85rem; display: none;
  }
  .toast.ok  { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
  .toast.err { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
  .toast.show { display: block; }

  @media (prefers-color-scheme: dark) {
    .toast.ok  { background: #14532d; color: #bbf7d0; border-color: #166534; }
    .toast.err { background: #450a0a; color: #fecaca; border-color: #991b1b; }
  }

  .empty { text-align: center; color: var(--text3); font-size: 0.875rem; padding: 2rem 0; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Kiosk Manager</h1>
  <p class="sub">Add URLs and set how long each displays before the next one loads.</p>
  <div id="list"></div>
  <div class="actions">
    <button class="btn-add" onclick="addRow()">+ Add URL</button>
    <button class="btn-save" onclick="saveAll()">Save</button>
  </div>
  <div id="toast" class="toast"></div>
</div>

<script>
let items = [];
let activeIndex = -1;

async function load() {
  try {
    const r = await fetch("/api/urls");
    items = await r.json();
    // Backfill enabled:true for any entries that predate this feature
    items = items.map(x => ({ enabled: true, ...x }));
  } catch(e) {
    items = [];
  }
  render();
}

async function pollState() {
  try {
    const r = await fetch("/api/state");
    const d = await r.json();
    if (d.index !== activeIndex) {
      activeIndex = d.index;
      render();
    }
  } catch(e) {}
}

function esc(s) {
  return (s || "").replace(/&/g, "&amp;").replace(/"/g, "&quot;");
}

function render() {
  const list = document.getElementById("list");
  if (!items.length) {
    list.innerHTML = '<p class="empty">No URLs yet — click "+ Add URL" to get started.</p>';
    return;
  }
  list.innerHTML = "";
  items.forEach((item, i) => {
    const isActive   = i === activeIndex;
    const isDisabled = !item.enabled;
    const row = document.createElement("div");
    row.className = "row" + (isActive ? " active" : "") + (isDisabled ? " disabled" : "");

    row.innerHTML = `
      <span class="dot"></span>
      <input type="text" value="${esc(item.url)}" placeholder="https://example.com"
             oninput="items[${i}].url = this.value">
      <div class="dur">
        <input type="number" value="${item.duration}" min="5" max="3600"
               oninput="items[${i}].duration = +this.value">
        <span>sec</span>
      </div>
      <label class="toggle" title="${item.enabled ? "Enabled — click to disable" : "Disabled — click to enable"}">
        <input type="checkbox" ${item.enabled ? "checked" : ""}
               onchange="items[${i}].enabled = this.checked; render();">
        <span class="toggle-track"></span>
      </label>
      <button class="btn btn-up" onclick="move(${i}, -1)" ${i === 0 ? "disabled" : ""}>↑</button>
      <button class="btn btn-dn" onclick="move(${i},  1)" ${i === items.length - 1 ? "disabled" : ""}>↓</button>
      <button class="btn btn-del" onclick="del(${i})">✕</button>
    `;
    list.appendChild(row);
  });
}

function addRow() {
  items.push({ url: "", duration: 30, enabled: true });
  render();
  const inputs = document.querySelectorAll(".row input[type='text']");
  if (inputs.length) inputs[inputs.length - 1].focus();
}

function del(i) {
  items.splice(i, 1);
  render();
}

function move(i, d) {
  const j = i + d;
  if (j < 0 || j >= items.length) return;
  [items[i], items[j]] = [items[j], items[i]];
  render();
}

async function saveAll() {
  const clean = items.filter(x => x.url && x.url.trim());
  try {
    const r = await fetch("/api/urls", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(clean)
    });
    const d = await r.json();
    if (d.ok) {
      items = clean;
      render();
      toast("Saved! Changes take effect on the next cycle.", "ok");
    } else {
      toast("Save failed: " + (d.error || "unknown"), "err");
    }
  } catch(e) {
    toast("Save failed: " + e, "err");
  }
}

function toast(msg, type) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = `toast ${type} show`;
  setTimeout(() => el.classList.remove("show"), 3500);
}

// Initial load then poll state every 3 seconds
load();
setInterval(pollState, 3000);
</script>
</body>
</html>
