<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kiosk Manager — Login</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #f1f5f9;
    --surface:  #ffffff;
    --border:   #e2e8f0;
    --border2:  #cbd5e1;
    --text:     #1e293b;
    --text2:    #64748b;
    --focus:    #6366f1;
    --btn-bg:   #4f46e5;
    --btn-hover:#4338ca;
    --err-bg:   #fee2e2;
    --err-text: #991b1b;
    --err-bdr:  #fecaca;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg:       #0f172a;
      --surface:  #1e293b;
      --border:   #334155;
      --border2:  #475569;
      --text:     #f1f5f9;
      --text2:    #94a3b8;
      --focus:    #818cf8;
      --btn-bg:   #4f46e5;
      --btn-hover:#6366f1;
      --err-bg:   #450a0a;
      --err-text: #fca5a5;
      --err-bdr:  #991b1b;
    }
  }

  body {
    font-family: system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2rem;
    width: 100%;
    max-width: 360px;
  }

  h1 {
    font-size: 1.2rem;
    font-weight: 600;
    margin-bottom: 0.2rem;
  }

  .sub {
    color: var(--text2);
    font-size: 0.85rem;
    margin-bottom: 1.5rem;
  }

  .field { margin-bottom: 1rem; }

  label {
    display: block;
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--text2);
    margin-bottom: 0.3rem;
  }

  input[type="text"],
  input[type="password"] {
    width: 100%;
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 0.5rem 0.75rem;
    font-size: 0.9rem;
    background: var(--surface);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }

  input:focus { border-color: var(--focus); }

  .btn-login {
    width: 100%;
    height: 40px;
    background: var(--btn-bg);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    margin-top: 0.5rem;
    transition: background 0.15s;
  }
  .btn-login:hover { background: var(--btn-hover); }
  .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

  .error {
    display: none;
    margin-top: 1rem;
    padding: 0.6rem 0.75rem;
    background: var(--err-bg);
    color: var(--err-text);
    border: 1px solid var(--err-bdr);
    border-radius: 8px;
    font-size: 0.85rem;
  }
  .error.show { display: block; }
</style>
</head>
<body>
<div class="card">
  <h1>Kiosk Manager</h1>
  <p class="sub">Sign in to manage your kiosk.</p>

  <div class="field">
    <label for="username">Username</label>
    <input type="text" id="username" autocomplete="username"
           placeholder="admin" autofocus>
  </div>

  <div class="field">
    <label for="password">Password</label>
    <input type="password" id="password" autocomplete="current-password"
           placeholder="••••••••">
  </div>

  <button class="btn-login" onclick="login()" id="btn-login">Sign in</button>
  <div class="error" id="error"></div>
</div>

<script>
// Allow pressing Enter in either field to submit
document.getElementById("username").addEventListener("keydown", e => { if (e.key === "Enter") login(); });
document.getElementById("password").addEventListener("keydown", e => { if (e.key === "Enter") login(); });

async function login() {
  const btn      = document.getElementById("btn-login");
  const errEl    = document.getElementById("error");
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value;

  if (!username || !password) {
    showError("Please enter your username and password.");
    return;
  }

  btn.disabled    = true;
  btn.textContent = "Signing in...";
  errEl.classList.remove("show");

  try {
    const r = await fetch("/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password })
    });
    const d = await r.json();
    if (d.ok) {
      window.location.href = "/";
    } else {
      showError(d.error || "Invalid username or password.");
    }
  } catch(e) {
    showError("Could not reach the server.");
  }

  btn.disabled    = false;
  btn.textContent = "Sign in";
}

function showError(msg) {
  const el = document.getElementById("error");
  el.textContent = msg;
  el.classList.add("show");
}
</script>
</body>
</html>
